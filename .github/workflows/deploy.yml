name: 🚀 Auto Deploy - tpq.lpialhidayah.or.id

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: 🌐 Deploy ke tpq.lpialhidayah.or.id
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build

      - name: 📤 Upload dist/ ke VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/staialmannan/tpq.lpialhidayah.or.id/dist"
          strip_components: 1

      - name: ♻️ Reload Apache di VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "✅ File berhasil diupload ke /home/staialmannan/tpq.lpialhidayah.or.id/dist"
            echo "🔧 Memperbaiki Permission (Gembok) dan Menghapus file default bawaan..."
            chown -R staialmannan:staialmannan /home/staialmannan/tpq.lpialhidayah.or.id
            rm -f /home/staialmannan/tpq.lpialhidayah.or.id/dist/default.html
            echo "♻️ Graceful reload Apache..."
            /usr/local/apps/apache2/bin/apachectl graceful
            echo "🎉 https://tpq.lpialhidayah.or.id sudah terupdate!"

      - name: ✅ Deploy Berhasil
        if: success()
        run: |
          echo "🎉 Deploy berhasil!"
          echo "🌐 Cek: https://tpq.lpialhidayah.or.id"

      - name: ❌ Deploy Gagal
        if: failure()
        run: echo "💥 Deploy gagal! Cek log di atas."
